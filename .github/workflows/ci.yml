name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  web:
    name: Web — lint / typecheck / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter web lint

      - name: Typecheck
        run: pnpm --filter web typecheck

      - name: Test
        run: pnpm --filter web test

  ocr:
    name: OCR service — syntax check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ocr
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Syntax check
        # Full dependency install (PaddlePaddle) is too heavy for CI.
        # This catches import-level syntax errors without the heavy runtime.
        run: python -m py_compile main.py && echo "syntax ok"
